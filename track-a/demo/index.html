<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>主见 · Keel</title>
  <style>
    :root {
      --bg: #0f1114;
      --surface: #181b20;
      --surface-2: #1f2329;
      --surface-elevated: #232830;
      --border: rgba(255,255,255,.07);
      --text: #e8eaed;
      --text-muted: #8b929a;
      --text-subtle: #6b7280;
      --accent: #c4a574;
      --accent-dim: rgba(196,165,116,.15);
      --danger: #c96a5a;
      --success: #6a9e7a;
      --radius: 14px;
      --radius-sm: 10px;
      --phone-w: 390px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --shadow-card: 0 2px 12px rgba(0,0,0,.28), 0 1px 0 rgba(255,255,255,.03) inset;
      --shadow-elevated: 0 8px 32px rgba(0,0,0,.38);
      --font-display: 22px;
      --font-title: 16px;
      --font-body: 15px;
      --font-caption: 12px;
      --font-micro: 11px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(165deg, #0a0c0f 0%, #141820 50%, #0f1114 100%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px calc(24px + var(--safe-bottom));
      -webkit-font-smoothing: antialiased;
    }

    .stage-label {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      opacity: .7;
    }

    .phone {
      width: 100%;
      max-width: var(--phone-w);
      background: var(--bg);
      border-radius: 36px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 720px;
      max-height: 860px;
      height: calc(100dvh - 120px);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .notch {
      width: 120px;
      height: 28px;
      background: #000;
      border-radius: 0 0 18px 18px;
      margin: 0 auto -8px;
      position: relative;
      z-index: 2;
    }

    header.app-header {
      padding: 8px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .brand-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: .02em;
    }

    .brand-en {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      margin-left: 6px;
    }

    .mode-badge {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .mode-badge.live { color: var(--success); border-color: rgba(106,158,122,.3); background: rgba(106,158,122,.08); }
    .mode-badge.mock { color: var(--accent); border-color: rgba(196,165,116,.25); background: var(--accent-dim); }

    .topic-wrap {
      margin-top: 14px;
    }

    .topic-label {
      display: block;
      font-size: var(--font-micro);
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .topic-pills {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .topic-pills::-webkit-scrollbar { display: none; }

    .topic-pill {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .2s, background .2s, color .2s;
      font-family: inherit;
    }

    .topic-pill.active {
      border-color: rgba(196,165,116,.45);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .topic-pill:focus-visible {
      outline: 2px solid rgba(196,165,116,.4);
      outline-offset: 2px;
    }

    .notify-preview {
      margin: 14px 16px 0;
      padding: 14px 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .notify-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2a2e35, #1a1d22);
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--accent);
    }

    .notify-body { flex: 1; min-width: 0; }

    .notify-app {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .notify-text {
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
    }

    .notify-hint {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
      opacity: .8;
    }

    .notify-mode-toggle {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .notify-mode-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
    }

    .notify-mode-btn.active {
      border-color: rgba(196,165,116,.35);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .force-segments {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .force-seg-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .2s, background .2s, color .2s;
    }

    .force-seg-btn.active {
      border-color: rgba(196,165,116,.4);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .force-advanced {
      margin-top: 4px;
    }

    .force-advanced summary {
      font-size: 10px;
      color: var(--text-subtle);
      cursor: pointer;
      list-style: none;
      margin-bottom: 8px;
    }

    .force-advanced summary::-webkit-details-marker { display: none; }

    .history-status {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 6px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .history-status.pending { border-color: rgba(196,165,116,.3); color: var(--accent); background: var(--accent-dim); }
    .history-status.verified { border-color: rgba(106,158,122,.3); color: var(--success); background: rgba(106,158,122,.08); }
    .history-status.overturned { border-color: rgba(201,106,90,.3); color: var(--danger); background: rgba(201,106,90,.08); }

    .force-bar {
      margin: 14px 16px 0;
      padding: 14px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      transition: border-color .25s, background .25s;
    }

    .force-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .force-level-name {
      font-weight: 500;
      transition: color .2s;
    }

    .force-track-wrap {
      position: relative;
      padding: 4px 0 2px;
    }

    .force-ticks {
      display: flex;
      justify-content: space-between;
      padding: 0 2px;
      margin-bottom: 6px;
      pointer-events: none;
    }

    .force-tick {
      width: 2px;
      height: 6px;
      border-radius: 1px;
      background: rgba(255,255,255,.12);
    }

    .force-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 10px;
      border-radius: 5px;
      background: linear-gradient(90deg,
        #5a9468 0%, #5a9468 20%,
        #7a9e8a 20%, #7a9e8a 40%,
        #c4a574 40%, #c4a574 60%,
        #d48460 60%, #d48460 80%,
        #c96a5a 80%, #c96a5a 100%);
      outline: none;
      cursor: pointer;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.35);
    }

    .force-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--force-thumb, var(--accent));
      border: 3px solid rgba(255,255,255,.2);
      box-shadow: 0 2px 12px rgba(0,0,0,.45), 0 0 0 1px rgba(0,0,0,.2);
      cursor: grab;
      transition: transform .15s;
    }

    .force-slider:active::-webkit-slider-thumb { transform: scale(1.08); cursor: grabbing; }

    .force-slider::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--force-thumb, var(--accent));
      border: 3px solid rgba(255,255,255,.2);
      box-shadow: 0 2px 12px rgba(0,0,0,.45);
      cursor: grab;
    }

    .force-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: var(--font-micro);
      font-weight: 500;
    }

    .force-scale span:first-child { color: var(--success); }
    .force-scale span:last-child { color: var(--danger); }
    .force-scale span:nth-child(2) { color: var(--text-subtle); font-weight: 400; }

    .main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    .tab-panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .tab-panel.active { display: flex; flex-direction: column; }

    /* 说 */
    .speak-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .transcript-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      font-size: var(--font-micro);
      letter-spacing: .06em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-label-hint {
      font-weight: 400;
      color: var(--text-subtle);
      letter-spacing: 0;
    }

    .transcript-box {
      min-height: 120px;
      background: var(--surface-elevated);
      border: 1.5px solid rgba(196,165,116,.25);
      border-radius: var(--radius);
      padding: 16px;
      font-size: var(--font-body);
      line-height: 1.6;
      color: var(--text);
      resize: none;
      font-family: inherit;
      box-shadow: var(--shadow-card);
      transition: border-color .2s, box-shadow .2s;
    }

    .transcript-box:focus {
      outline: none;
      border-color: rgba(196,165,116,.5);
      box-shadow: 0 0 0 3px rgba(196,165,116,.1), var(--shadow-card);
    }

    .transcript-box.has-text {
      border-color: rgba(106,158,122,.35);
    }

    .transcript-box::placeholder { color: var(--text-subtle); }

    .hold-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 12px 0 4px;
    }

    .hold-btn {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 30%, rgba(196,165,116,.35), rgba(196,165,116,.08) 70%);
      color: var(--accent);
      cursor: pointer;
      user-select: none;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 6px 32px rgba(196,165,116,.18), inset 0 1px 0 rgba(255,255,255,.12);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hold-btn svg {
      width: 36px;
      height: 36px;
      fill: currentColor;
      opacity: .9;
    }

    .hold-btn::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(196,165,116,.2);
      pointer-events: none;
      transition: border-color .2s, transform .2s;
    }

    .hold-btn:active, .hold-btn.recording {
      transform: scale(.95);
      box-shadow: 0 4px 20px rgba(196,165,116,.3), inset 0 2px 8px rgba(0,0,0,.15);
    }

    .hold-btn.recording::after {
      border-color: rgba(201,106,90,.5);
      animation: pulse-ring 1.2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.12); opacity: 0; }
    }

    .hold-hint { font-size: var(--font-caption); color: var(--text-muted); text-align: center; max-width: 260px; line-height: 1.45; }

    .submit-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent-dim);
      border-color: rgba(196,165,116,.35);
      color: var(--accent);
      font-weight: 500;
    }

    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .reply-card {
      margin-top: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-card);
    }

    .reply-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .reply-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(201,106,90,.12);
      color: var(--danger);
      border: 1px solid rgba(201,106,90,.25);
    }

    .reply-body {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
    }

    .reply-body p { margin-bottom: 10px; }
    .reply-body p:last-child { margin-bottom: 0; }

    /* 立场 */
    .position-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      line-height: 1.75;
      font-size: var(--font-body);
      box-shadow: var(--shadow-card);
    }

    .position-card.empty {
      color: var(--text-muted);
      font-style: normal;
      text-align: center;
      padding: 56px 28px;
      border-style: dashed;
      border-color: rgba(255,255,255,.1);
      background: rgba(255,255,255,.02);
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 14px;
      opacity: .5;
      line-height: 1;
    }

    .empty-state-title {
      font-size: var(--font-title);
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state-desc {
      font-size: var(--font-caption);
      line-height: 1.55;
      color: var(--text-subtle);
      max-width: 240px;
      margin: 0 auto;
    }

    .position-updated {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .contradiction-banner {
      margin-bottom: 12px;
      padding: 10px 12px;
      background: rgba(201,106,90,.08);
      border: 1px solid rgba(201,106,90,.2);
      border-radius: 10px;
      font-size: 13px;
      color: #d4a098;
    }

    /* 日志 */
    .search-box {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 14px;
      font-family: inherit;
    }

    .snapshot-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .snapshot-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: border-color .2s, box-shadow .2s;
    }

    .snapshot-item:hover { border-color: rgba(196,165,116,.25); box-shadow: var(--shadow-elevated); }
    .snapshot-item.expanded { border-color: rgba(196,165,116,.35); }

    .snapshot-full {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin-top: 0;
      padding-top: 0;
      border-top: none;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      transition: max-height .35s ease, opacity .25s ease, margin-top .25s, padding-top .25s;
    }

    .snapshot-item.expanded .snapshot-full {
      max-height: 400px;
      opacity: 1;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .snapshot-item.expanded .snapshot-snippet { display: none; }

    .snapshot-date {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .snapshot-snippet {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
    }

    .snapshot-full {
      display: block;
    }

    .empty-log {
      text-align: center;
      color: var(--text-muted);
      padding: 56px 24px;
      font-size: var(--font-caption);
      line-height: 1.55;
    }

    .empty-log .empty-state-icon { margin-bottom: 12px; }
    .empty-log .empty-state-title { margin-bottom: 6px; }

    /* 历史 — 时间线 */
    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-left: 8px;
    }

    .history-item {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: border-color .2s, box-shadow .2s;
      margin-left: 20px;
      margin-bottom: 14px;
    }

    .history-item::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px rgba(196,165,116,.25);
      z-index: 1;
    }

    .history-item::after {
      content: '';
      position: absolute;
      left: -16px;
      top: 28px;
      bottom: -14px;
      width: 2px;
      background: linear-gradient(180deg, rgba(196,165,116,.35), rgba(196,165,116,.08));
    }

    .history-item:last-child::after { display: none; }

    .history-item:hover { border-color: rgba(196,165,116,.25); box-shadow: var(--shadow-elevated); }
    .history-item.expanded { border-color: rgba(196,165,116,.4); }

    .history-head {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-chevron {
      position: absolute;
      right: 14px;
      top: 16px;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transition: transform .3s ease;
    }

    .history-item.expanded .history-chevron { transform: rotate(180deg); }

    .history-detail {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      padding: 0 16px;
      border-top: none;
      transition: max-height .4s ease, opacity .3s ease, padding .3s ease;
    }

    .history-item.expanded .history-detail {
      max-height: 800px;
      opacity: 1;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }

    .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .history-topic {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--accent);
      white-space: nowrap;
    }

    .history-preview {
      font-size: 13px;
      line-height: 1.45;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-detail {
      display: block;
    }

    .history-block {
      margin-top: 12px;
    }

    .history-block-label {
      font-size: 10px;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .history-block-body {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      background: var(--bg);

  function emptyStateHtml(icon, title, desc) {

  function setLoading(on, text) {
    var overlay = $('loadingOverlay');
    overlay.classList.toggle('visible', on);

    if (text) $('loadingText').textContent = text;
  }

  function updateTranscriptState() {
    var box = $('transcript');
    box.classList.toggle('has-text', box.value.trim().length > 0);
  }

  function formatReplyHtml(text) {
    var sections = [];
    var re = /【(主见|为什么|下一步)】/g;
    var parts = text.split(re);
    if (parts.length > 1) {
      for (var i = 1; i < parts.length; i += 2) {
        var label = parts[i];
        var body = (parts[i + 1] || '').trim();
        sections.push('<div class="reply-section"><div class="reply-section-label">' + label + '</div><p>' +
          body.replace(/\n/g, '<br>') + '</p></div>');
      }
      return sections.join('');
    }
    return text.split('\n\n').map(function (p) {
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
  }

  function inferConfirmQuestion(text) {
    var t = text.trim().slice(0, 80);
    if (t.length < 8) return '你要我帮你看清的是哪件事？';
    return '我理解你要判断的是：「' + t + (text.length > 80 ? '…' : '') + '」';
  }

  function showConfirmCard() {
    var text = $('transcript').value.trim();
    if (!text) { $('transcript').focus(); return; }
    $('confirmQuestion').textContent = inferConfirmQuestion(text);
    $('confirmCard').classList.add('visible');
  }

  function hideConfirmCard() {
    $('confirmCard').classList.remove('visible');

  function setForceLevel(level) {
    level = Math.max(1, Math.min(5, level | 0));
    state.forceLevel = level;
    var info = FORCE_LEVELS[level - 1] || FORCE_LEVELS[2];
    $('forceLevelName').textContent = info.short;
    $('forceLevelName').style.color = info.color;
    $('forceSlider').value = String(level);
    $('forceSlider').setAttribute('aria-valuenow', String(level));
    $('forceBar').style.borderColor = info.color + '55';
    $('forceBar').style.setProperty('--force-thumb', info.color);
    document.querySelectorAll('.force-seg-btn').forEach(function (btn) {
      btn.classList.toggle('active', parseInt(btn.dataset.level, 10) === level);
    });
  }

  }

  function formatTimestamp(ts) {
    if (!ts) return '未知时间';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return ts.slice(0, 16).replace('T', ' ');
    var pad = function (n) { return n.toString().padStart(2, '0'); };
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
      ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function fetchTopicLive(slug) {
    if (!state.live || !state.apiKey) return false;
    setLoading(true, '同步话题数据…');
    try {
      var res = await fetch(state.apiBase.replace(/\/$/, '') + '/v1/topic/' + slug, {
        method: 'GET',
        headers: { 'X-API-Key': state.apiKey },
        signal: AbortSignal.timeout(8000)
      });
      if (!res.ok) return false;
      var data = await res.json();
      var t = TOPICS[slug];
      if (!t) return false;
      if (data.living_position) {
        t.livingPosition = data.living_position;
        t.positionUpdated = '更新于 Live · ' + (data.entries_count || 0) + ' 条记录';
      }
      if (data.snapshots && data.snapshots.length) {
        t.snapshots = data.snapshots.map(function (s) {
          var preview = s.preview || s.snippet || '';
          return {
            date: s.date || '',
            snippet: preview.slice(0, 80) + (preview.length > 80 ? '…' : ''),
            full: preview
          };
        });
      }
      if (data.entries && data.entries.length) {
        var liveHistory = data.entries.map(function (e, i) {
          return {
            id: 'live-' + slug + '-' + i,
            topic_slug: slug,
            topic_name: data.display_name || t.name,
            timestamp: e.timestamp,
            raw_text: e.raw_text,
            reply: e.reply,
            advice_intensity: e.advice_intensity || 3
          };
        });
        state.history = state.history.filter(function (h) {
          return h.topic_slug !== slug;
        }).concat(liveHistory);
      }
      return true;
    } catch (e) {
      return false;
    } finally {
      setLoading(false);
    }
  }

      btn.textContent = TOPICS[slug].name;
      btn.dataset.slug = slug;
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', slug === state.topic ? 'true' : 'false');
      btn.addEventListener('click', function () {
        state.topic = slug;
        renderTopicPills();
        loadTopicUI();
      });
      wrap.appendChild(btn);
    });
  }

    var t = TOPICS[state.topic];

  function renderSnapshots(filter) {
    var t = TOPICS[state.topic];
    var list = $('snapshotList');
    var q = (filter || '').trim().toLowerCase();
    var items = t.snapshots.filter(function (s) {
      if (!q) return true;
      return (s.date + s.snippet + s.full).toLowerCase().indexOf(q) >= 0;
    });
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<li class="empty-log">' + emptyStateHtml('📋', q ? '无匹配快照' : '暂无日志快照', q ? '换个关键字试试' : '每日整理后会在此留下 discreet 快照，不含敏感细节。') + '</li>';
      return;
    }
    items.forEach(function (s) {
      var li = document.createElement('li');
      li.className = 'snapshot-item';
      li.innerHTML = '<div class="snapshot-date">' + s.date + '</div>' +
        '<div class="snapshot-snippet">' + s.snippet + '</div>' +

      list.appendChild(li);

  async function submitEntry() {
    var text = $('transcript').value.trim();
    if (!text) {
      $('transcript').focus();
      return;
    }
    if (state.submitting) return;
    state.submitting = true;
    var btn = $('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>请教中…';

    var t = TOPICS[state.topic];
    var usedLive = false;

    if (state.live && state.apiKey) {
      setLoading(true, '军师思考中…');
      try {
        var res = await fetch(state.apiBase.replace(/\/$/, '') + '/v1/entry', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-API-Key': state.apiKey
          },
          body: JSON.stringify({
            topic_slug: state.topic,
            raw_text: text,
            advice_intensity: state.forceLevel
          }),
          signal: AbortSignal.timeout(60000)
        });
        if (!res.ok) {
          var errBody = await res.text();
          throw new Error(errBody || ('HTTP ' + res.status));
        }
        var data = await res.json();
        renderReply(data.reply, true);
        if (data.living_position_summary) {
          t.livingPosition = data.living_position_summary;
          t.positionUpdated = '更新于 ' + (data.timestamp || '刚刚').slice(0, 10);
          t.contradiction = !!data.contradiction_detected;
          renderPosition();
        }
        if (data.daily_snapshot_snippet) {
          t.snapshots.unshift({
            date: (data.timestamp || new Date().toISOString()).slice(0, 10),
            snippet: data.daily_snapshot_snippet.slice(0, 80) + (data.daily_snapshot_snippet.length > 80 ? '…' : ''),
            full: data.daily_snapshot_snippet
          });
          renderSnapshots($('logSearch').value);
        }
        state.history.unshift({
          id: 'live-' + state.topic + '-' + Date.now(),
          topic_slug: state.topic,
          topic_name: t.name,
          timestamp: data.timestamp || new Date().toISOString(),
          raw_text: text,
          reply: data.reply,
          advice_intensity: state.forceLevel
        });
        renderHistory();
        setNotifyText('live');
        usedLive = true;
      } catch (err) {
        renderReply(t.sampleReply + '\n\n—\n（Live 请求失败：' + (err.message || '网络错误') + '，以上为演示回复）', false);
      } finally {
        setLoading(false);
      }
    }

    if (!usedLive) {
      await new Promise(function (r) { setTimeout(r, 600); });
      renderReply(t.sampleReply, false);
      state.history.unshift({
        id: 'mock-' + Date.now(),
        topic_slug: state.topic,
        topic_name: t.name,
        timestamp: new Date().toISOString(),
        raw_text: text,
        reply: t.sampleReply,
        advice_intensity: state.forceLevel
      });
      renderHistory();
      setNotifyText('default');
    }

    switchTab('speak');
    btn.disabled = false;
    btn.textContent = '确认并请教军师';
    state.submitting = false;
  }

    $('holdBtn').classList.add('recording');
    $('holdHint').textContent = '聆听中…';
    holdTimer = setTimeout(function () {
      var t = TOPICS[state.topic];
      $('transcript').value = t.sampleTranscript;
      updateTranscriptState();
      $('holdHint').textContent = '已填入示例转写 · 可编辑后提交';
    }, 500);
  }

  function endHold() {
    clearTimeout(holdTimer);
    $('holdBtn').classList.remove('recording');
    if ($('holdHint').textContent === '聆听中…') {
      $('holdHint').textContent = '模拟快捷指令 · 松开后填入示例转写';
    }
  }

  $('clearBtn').addEventListener('click', function () {
    $('transcript').value = '';
    updateTranscriptState();
  });

  $('transcript').addEventListener('input', updateTranscriptState);

  $('submitBtn').addEventListener('click', showConfirmCard);

  $('confirmYes').addEventListener('click', function () {
    hideConfirmCard();
    submitEntry();
  });
  $('confirmEdit').addEventListener('click', function () {
    hideConfirmCard();
    $('transcript').focus();
  });
  $('confirmCancel').addEventListener('click', hideConfirmCard);

  document.querySelectorAll('.prompt-chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      $('transcript').value = chip.dataset.prompt;
      updateTranscriptState();
    });
  });

  $('errorDemoBtn').addEventListener('click', function () {
    $('errorDemoText').textContent = '这句我没听准。你可以重说，或直接改这 12 个字。';
    $('transcript').value = '腾讯阿里版权…（听不清）';
    $('transcript').focus();
    updateTranscriptState();
  });

  $('settingsBtn').addEventListener('click', function () {
    $('apiBase').value = state.apiBase;
    $('apiKey').value = state.apiKey;
    $('settingsModal').classList.add('open');
  });

  $('closeSettings').addEventListener('click', function () {
    $('settingsModal').classList.remove('open');
  });

  $('saveSettings').addEventListener('click', async function () {
    state.apiBase = $('apiBase').value.trim() || 'http://127.0.0.1:8787';
    state.apiKey = $('apiKey').value.trim();
    localStorage.setItem('keel_api_base', state.apiBase);
    localStorage.setItem('keel_api_key', state.apiKey);
    $('settingsModal').classList.remove('open');
    await checkLive();
  });

  $('settingsModal').addEventListener('click', function (e) {
    if (e.target === $('settingsModal')) $('settingsModal').classList.remove('open');
  });

  /* Init */
  renderTopicPills();
  loadTopicUI();
  updateClock();
  setInterval(updateClock, 30000);
  checkLive();
})();
  </script>
</body>
</html>
