# Used when Service Root Directory is repo root (not track-a).
# Prefer Settings → Root Directory = track-a and track-a/railway.toml.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
