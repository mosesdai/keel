name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'track-a/server/**'
      - 'track-a/Dockerfile'
      - 'track-a/railway.toml'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'track-a/server/**'
      - '.github/workflows/server-ci.yml'

defaults:
  run:
    working-directory: track-a/server

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: track-a/server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import FastAPI app
        run: python -c "from app import app; assert app is not None"

      - name: Health smoke (in-process)
        env:
          KEEL_API_KEY: ci-smoke-key
        run: |
          python - <<'PY'
          import os
          os.environ.setdefault("KEEL_API_KEY", "ci-smoke-key")
          from fastapi.testclient import TestClient
          from app import app
          client = TestClient(app)
          r = client.get("/health")
          assert r.status_code == 200, r.text
          body = r.json()
          assert body.get("status") == "ok" or "ok" in str(body).lower(), body
          print("health ok:", body)
          PY
